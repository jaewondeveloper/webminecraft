<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
	<meta name="google" content="notranslate" />
	<title>Minecraft</title>
	<link type="image/png" rel="shortcut icon" href="favicon.png?v=22" />
	<script type="text/javascript">window.__eaglerOverlayMode="timer";window.__eaglerOverlayMinMs=12000;</script>
	<script type="text/javascript" src="jaewon-boot.js?v=24"></script>
	<script type="text/javascript" src="classes.js?v=22"></script>
	<script type="text/javascript">
		"use strict";
		window.addEventListener("load", function() {
			if (window.location.href.indexOf("file:") === 0) {
				alert("HTTP? ?????. http://localhost:8083");
				return;
			}

			var bootSplash = document.createElement("div");
			bootSplash.style.cssText = "position:fixed;top:0;left:0;right:0;bottom:0;z-index:1000;image-rendering:pixelated;background:center / contain no-repeat url(splash.png?v=22), 0px 0px / 1000000% 1000000% no-repeat url(splash.png?v=22) black";
			document.body.appendChild(bootSplash);

			function startGame() {
				window.removeEventListener("keydown", startGame);
				window.removeEventListener("mousedown", startGame);
				window.removeEventListener("touchstart", startGame);
				if (bootSplash.parentNode) document.body.removeChild(bootSplash);

				var relayId = Math.floor(Math.random() * 3);
				window.eaglercraftXOpts = {
					demoMode: false,
					container: "game_frame",
					assetsURI: "assets.epk",
					worldsDB: "worlds",
					lang: "ko_kr",
					localesURI: "lang/",
					localStorageNamespace: "eaglercb",
					showBootMenuOnLaunch: false,
					allowBootMenu: false,
					bootMenuBlocksUnsignedClients: false,
					enableSignatureBadge: false,
					enableDownloadOfflineButton: false,
					allowUpdateSvc: false,
					allowUpdateDL: false,
					enableMinceraft: false,
					forceProfanityFilter: false,
					html5CursorSupport: true,
					openDebugConsoleOnLaunch: false,
					logInvalidCerts: false,
					crashOnUncaughtExceptions: true,
					checkRelaysForUpdates: true,
					allowServerRedirects: true,
					forceWebGL1: true,
					forceWebGL2: false,
					singleThreadMode: true,
					useVisualViewport: true,
					ramdiskMode: true,
					eaglerNoDelay: false,
					relays: [
						{ addr: "wss://relay.deev.is/", comment: "relay #1", primary: relayId === 0 },
						{ addr: "wss://relay.lax1dude.net/", comment: "relay #2", primary: relayId === 1 },
						{ addr: "wss://relay.shhnowisnottheti.me/", comment: "relay #3", primary: relayId === 2 }
					]
				};

				var q = window.location.search;
				if ((typeof q === "string") && q[0] === "?" && (typeof window.URLSearchParams !== "undefined")) {
					q = new window.URLSearchParams(q);
					var s = q.get("server");
					if (s) window.eaglercraftXOpts.joinServer = s;
				}

				if (typeof main !== "function") {
					alert("?? ?? ??");
					return;
				}

				if (typeof window.__eaglerShowLoadingSplashAfterMain === "function") {
					window.__eaglerShowLoadingSplashAfterMain();
				}
				if (typeof window.__eaglerInstallNetworkStatusHooks === "function") {
					window.__eaglerInstallNetworkStatusHooks();
				}
				main();
				if (typeof window.__eaglerStartLoadingOverlayWatch === "function") {
					window.__eaglerStartLoadingOverlayWatch();
				}
			}

			window.addEventListener("keydown", startGame);
			window.addEventListener("mousedown", startGame);
			window.addEventListener("touchstart", startGame);
		});
	</script>
</head>
<body style="margin:0px;width:100%;height:100%;overflow:hidden;background-color:black;" id="game_frame"></body>
</html>
